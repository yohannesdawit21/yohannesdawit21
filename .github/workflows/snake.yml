name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: yohannesdawit21
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push snake
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update snake"
          add: "dist"

      - name: Deploy snake
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist